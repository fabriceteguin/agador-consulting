<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGADOR CONSULTING — Études · Audit · Formation · Stratégie</title>
<meta name="description" content="Cabinet de conseil et bureau d'études spécialisé en environnement, QHSE, formation et stratégie. Agréé ANDE et FDFP. Basé à Abidjan, Côte d'Ivoire.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:  #1B4D3E; --green-d:#112E24; --green-l:#2D7A62;
    --gold:   #C8973A; --gold-l: #E5C47E; --gold-bg:#FDFAF4;
    --dark:   #1C2B3A; --dark-d: #0D1620;
    --ivory:  #F9F7F2; --stone:  #EDE9E1;
    --muted:  #4A6278; --subtle: #8599AC;
    --serif:  'Cormorant Garamond', Georgia, serif;
    --sans:   'Plus Jakarta Sans', sans-serif;
  }
  html { font-family: var(--sans); background: var(--ivory); color: var(--dark); -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  body { overflow-x: hidden; }
  button { cursor: pointer; font-family: var(--sans); }
  a { text-decoration: none; color: inherit; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Design tokens ── */
const C = {
  green:'#1B4D3E', greenD:'#112E24', greenL:'#2D7A62',
  gold:'#C8973A', goldL:'#E5C47E', goldBg:'#FDFAF4',
  dark:'#1C2B3A', darkD:'#0D1620',
  ivory:'#F9F7F2', stone:'#EDE9E1',
  muted:'#4A6278', subtle:'#8599AC',
  white:'#ffffff',
};
const F = { serif:"'Cormorant Garamond',serif", sans:"'Plus Jakarta Sans',sans-serif" };
const ease = 'cubic-bezier(0.4,0,0.2,1)';

/* ── Logo ── */
function Logo({ dark = false, size = 'md' }) {
  const sizes = { sm: [15, 6, 14], md: [19, 7, 19], lg: [26, 8.5, 26] };
  const [nameSize, subSize, height] = sizes[size];
  const nameColor = dark ? C.white : C.dark;
  const locColor  = dark ? 'rgba(255,255,255,0.38)' : C.subtle;
  return (
    <div style={{display:'flex',alignItems:'center',gap:size==='lg'?14:8,cursor:'pointer',flexShrink:0}}>
      <span style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:nameSize,fontWeight:700,letterSpacing:'0.04em',color:nameColor,lineHeight:1,whiteSpace:'nowrap'}}>Agador</span>
      <span style={{width:1,height:height,background:C.gold,flexShrink:0}}></span>
      <div style={{display:'flex',flexDirection:'column',gap:2}}>
        <span style={{fontFamily:"Arial,sans-serif",fontSize:subSize,fontWeight:700,letterSpacing:'0.24em',textTransform:'uppercase',color:C.gold,lineHeight:1,whiteSpace:'nowrap'}}>Consulting</span>
        <span style={{fontFamily:"Arial,sans-serif",fontSize:size==='lg'?7:6,fontWeight:500,letterSpacing:'0.16em',textTransform:'uppercase',color:locColor,lineHeight:1,whiteSpace:'nowrap'}}>Abidjan · Côte d'Ivoire</span>
      </div>
    </div>
  );
}

/* ── Header ── */
function Header({ page, setPage }) {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const bg = 'rgba(249,247,242,0.97)';
  const border = `1px solid ${C.stone}`;
  const navLinks = [
    {id:'accueil',label:'Accueil'},{id:'services',label:'Services'},
    {id:'academy',label:'Academy'},{id:'cabinet',label:'Le Cabinet'},{id:'contact',label:'Contact'},
  ];
  const go = (id) => { setPage(id); setMobileOpen(false); window.scrollTo({top:0}); };
  return (
    <header style={{position:'fixed',top:0,left:0,right:0,zIndex:100,background:bg,backdropFilter:scrolled?'blur(14px)':'none',borderBottom:border,transition:`all 280ms ${ease}`}}>
      <div style={{maxWidth:1200,margin:'0 auto',padding:'0 40px',height:68,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div onClick={()=>go('accueil')}><Logo dark={false} size="md"/></div>
        <nav style={{display:'flex',alignItems:'center',gap:4}}>
          {navLinks.map(l=>(
            <button key={l.id} onClick={()=>go(l.id)} style={{fontFamily:F.sans,fontSize:13,fontWeight:page===l.id?700:500,color:page===l.id?C.green:C.dark,background:'none',border:'none',padding:'8px 14px',borderRadius:4,letterSpacing:'0.02em',transition:`color 180ms ${ease}`}}>{l.label}</button>
          ))}
          <button onClick={()=>go('contact')} style={{fontFamily:F.sans,fontSize:13,fontWeight:600,padding:'9px 20px',borderRadius:4,background:C.gold,color:C.white,border:'none',marginLeft:8,letterSpacing:'0.02em',transition:`background 180ms ${ease}`}}>Devis gratuit</button>
        </nav>
      </div>
    </header>
  );
}

/* ── Footer ── */
function Footer({ setPage }) {
  const go = (id) => { setPage(id); window.scrollTo({top:0}); };
  return (
    <footer style={{background:C.dark,padding:'64px 40px 32px'}}>
      <div style={{maxWidth:1200,margin:'0 auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:48,marginBottom:48,paddingBottom:40,borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
          <div>
            <div style={{marginBottom:16,cursor:'pointer'}} onClick={()=>go('accueil')}><Logo dark size="md"/></div>
            <p style={{fontFamily:F.sans,fontSize:13,color:'rgba(255,255,255,0.5)',lineHeight:1.7,marginBottom:18,maxWidth:280}}>Cabinet de conseil et bureau d'études spécialisé en environnement, QHSE, formation et stratégie. Basé à Abidjan, Côte d'Ivoire.</p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {[['../actifs/logo-ande.png','Agréé ANDE',true],['../actifs/logo-fdfp.png','Agréé FDFP',false]].map(([src,label,round])=>(
                <span key={label} style={{display:'inline-flex',alignItems:'center',gap:6,fontFamily:F.sans,fontSize:10,fontWeight:600,padding:'4px 10px',background:'rgba(200,151,58,0.12)',color:C.gold,border:'1px solid rgba(200,151,58,0.28)',borderRadius:3}}>
                  <img src={src} style={{height:14,objectFit:'contain',borderRadius:round?'50%':'none'}} alt={label}/>{label}
                </span>
              ))}
              <span style={{display:'inline-flex',alignItems:'center',fontFamily:F.sans,fontSize:10,fontWeight:600,padding:'4px 10px',background:'rgba(255,255,255,0.07)',color:'rgba(255,255,255,0.55)',borderRadius:3}}>ISO · MASE</span>
            </div>
          </div>
          {[
            {title:'Services',links:[['services','Études & Environnement'],['services','Audit & QHSE'],['academy','Formations FDFP'],['services','Conseil stratégique'],['services','ESG & Durabilité']]},
            {title:'Le Cabinet',links:[['cabinet','Notre mission'],['cabinet','Directeur Général'],['cabinet','Nos agréments'],['contact','Références clients'],['academy','AGADOR Academy']]},
            {title:'Contact',links:[['contact','Nous écrire'],['contact','Demander un devis'],['contact','Cocody Riviera Faya'],['contact','info@agadorconsultingci.com'],['contact','+225 07 01 67 03 10']]},
          ].map(col=>(
            <div key={col.title}>
              <div style={{fontFamily:F.sans,fontSize:11,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:C.white,marginBottom:16}}>{col.title}</div>
              {col.links.map(([page,label])=>(
                <div key={label} onClick={()=>go(page)} style={{fontFamily:F.sans,fontSize:13,color:'rgba(255,255,255,0.5)',marginBottom:10,cursor:'pointer',transition:`color 180ms ${ease}`}}>{label}</div>
              ))}
            </div>
          ))}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
          <span style={{fontFamily:F.sans,fontSize:12,color:'rgba(255,255,255,0.3)'}}>© {new Date().getFullYear()} AGADOR CONSULTING — Tous droits réservés.</span>
          <div style={{display:'flex',gap:20}}>
            <span style={{fontFamily:F.sans,fontSize:12,color:'rgba(255,255,255,0.3)'}}>Mentions légales</span>
            <span style={{fontFamily:F.sans,fontSize:12,color:'rgba(255,255,255,0.3)'}}>Politique de confidentialité</span>
          </div>
        </div>
      </div>
    </footer>
  );
}

/* ── Eyebrow ── */
function Eyebrow({ children, light=false, center=false }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,justifyContent:center?'center':'flex-start',marginBottom:14}}>
      <span style={{display:'inline-block',width:24,height:1.5,background:C.gold,flexShrink:0}}></span>
      <span style={{fontFamily:F.sans,fontSize:10,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:C.gold}}>{children}</span>
    </div>
  );
}

/* ══════════════════════════════════════════
   PAGE ACCUEIL
══════════════════════════════════════════ */

    { color:C.dark,  light:'#F4F7FA', title:'Audit & Systèmes de Management', desc:'ISO 9001/14001/45001, MASE 2024, audits internes, SMI/QSE intégrés.', tag:'ISO · MASE' },
    { color:'#8A6012', light:C.goldBg, title:'Formation & Renforcement', desc:'Organisme agréé FDFP. QHSE, HST, leadership, hôtellerie, sur mesure.', tag:'Agréé FDFP' },

        <div style={{position:'absolute',inset:0,background:`linear-gradient(160deg,rgba(10,31,24,0.88) 0%,rgba(27,77,62,0.80) 45%,rgba(28,43,58,0.90) 100%)`}}></div>
        <div style={{position:'absolute',inset:0,backgroundImage:'repeating-linear-gradient(45deg,rgba(200,151,58,0.06) 0,rgba(200,151,58,0.06) 1px,transparent 1px,transparent 32px),repeating-linear-gradient(-45deg,rgba(200,151,58,0.06) 0,rgba(200,151,58,0.06) 1px,transparent 1px,transparent 32px)'}}></div>

            <h1 style={{fontFamily:F.serif,fontSize:66,fontWeight:300,color:C.white,lineHeight:1.05,letterSpacing:'-0.02em',marginBottom:20}}>

            <p style={{fontFamily:F.sans,fontSize:16,color:'rgba(255,255,255,0.68)',lineHeight:1.75,marginBottom:36,maxWidth:480}}>AGADOR CONSULTING vous accompagne dans la conformité environnementale, les systèmes QHSE, le renforcement de capacités et la transformation stratégique.</p>
            <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>

          <div>
            <Eyebrow>Le Cabinet</Eyebrow>
