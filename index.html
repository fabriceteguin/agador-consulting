<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGADOR CONSULTING — Études · Audit · Formation · Stratégie</title>
<meta name="description" content="Cabinet de conseil et bureau d'études spécialisé en environnement, QHSE, formation et stratégie. Agréé ANDE et FDFP. Basé à Abidjan, Côte d'Ivoire.">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:  #1B4D3E; --green-d:#112E24; --green-l:#2D7A62;
    --gold:   #C8973A; --gold-l: #E5C47E; --gold-bg:#FDFAF4;
    --dark:   #1C2B3A; --dark-d: #0D1620;
    --ivory:  #F9F7F2; --stone:  #EDE9E1;
    --muted:  #4A6278; --subtle: #8599AC;
    --serif:  'Cormorant Garamond', Georgia, serif;
    --sans:   'Plus Jakarta Sans', sans-serif;
  }
  html { font-family: var(--sans); background: var(--ivory); color: var(--dark); -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  body { overflow-x: hidden; }
  button { cursor: pointer; font-family: var(--sans); }
  a { text-decoration: none; color: inherit; }

  a[href^="mailto"], a[href^="tel"] { color: inherit !important; text-decoration: none !important; }

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Design tokens ── */
const C = {
  green:'#1B4D3E', greenD:'#112E24', greenL:'#2D7A62',
  gold:'#C8973A', goldL:'#E5C47E', goldBg:'#FDFAF4',
  dark:'#1C2B3A', darkD:'#0D1620',
  ivory:'#F9F7F2', stone:'#EDE9E1',
  muted:'#4A6278', subtle:'#8599AC',
  white:'#ffffff',
};
const F = { serif:"'Cormorant Garamond',serif", sans:"'Plus Jakarta Sans',sans-serif" };
const ease = 'cubic-bezier(0.4,0,0.2,1)';

/* ── Logo ── */
function Logo({ dark = false, size = 'md' }) {
  const sizes = { sm: [15, 6, 14], md: [19, 7, 19], lg: [26, 8.5, 26] };
  const [nameSize, subSize, height] = sizes[size];
  const nameColor = dark ? C.white : C.dark;
  const locColor  = dark ? 'rgba(255,255,255,0.38)' : C.subtle;
  return (
    <div style={{display:'flex',alignItems:'center',gap:size==='lg'?14:8,cursor:'pointer',flexShrink:0}}>
      <span style={{fontFamily:"Georgia,'Times New Roman',serif",fontSize:nameSize,fontWeight:700,letterSpacing:'0.04em',color:nameColor,lineHeight:1,whiteSpace:'nowrap'}}>Agador</span>
      <span style={{width:1,height:height,background:C.gold,flexShrink:0}}></span>
      <div style={{display:'flex',flexDirection:'column',gap:2}}>
        <span style={{fontFamily:"Arial,sans-serif",fontSize:subSize,fontWeight:700,letterSpacing:'0.24em',textTransform:'uppercase',color:C.gold,lineHeight:1,whiteSpace:'nowrap'}}>Consulting</span>
        <span style={{fontFamily:"Arial,sans-serif",fontSize:size==='lg'?7:6,fontWeight:500,letterSpacing:'0.16em',textTransform:'uppercase',color:locColor,lineHeight:1,whiteSpace:'nowrap'}}>Abidjan · Côte d'Ivoire</span>
      </div>
    </div>
  );
}

/* ── Header ── */
function Header({ page, setPage }) {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const bg = '#1B4D3E';
  const border = `1px solid rgba(255,255,255,0.12)`;
  const navLinks = [
    {id:'accueil',label:'Accueil'},{id:'services',label:'Services'},
    {id:'academy',label:'Academy'},{id:'cabinet',label:'Le Cabinet'},{id:'contact',label:'Contact'},
  ];
  const go = (id) => { setPage(id); setMobileOpen(false); window.scrollTo({top:0}); };
  return (
    <header style={{position:'fixed',top:0,left:0,right:0,zIndex:100,background:bg,backdropFilter:scrolled?'blur(14px)':'none',borderBottom:border,transition:`all 280ms ${ease}`}}>
      <div style={{maxWidth:1200,margin:'0 auto',padding:'0 40px',height:68,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div onClick={()=>go('accueil')}><Logo dark={true} size="md"/></div>
        <nav style={{display:'flex',alignItems:'center',gap:4}}>
          {navLinks.map(l=>(
            <button key={l.id} onClick={()=>go(l.id)} style={{fontFamily:F.sans,fontSize:13,fontWeight:page===l.id?700:500,color:page===l.id?C.gold:C.white,background:'none',border:'none',padding:'8px 14px',borderRadius:4,letterSpacing:'0.02em',transition:`color 180ms ${ease}`}}>{l.label}</button>
          ))}
          <button onClick={()=>go('contact')} style={{fontFamily:F.sans,fontSize:13,fontWeight:600,padding:'9px 20px',borderRadius:4,background:C.gold,color:C.white,border:'none',marginLeft:8,letterSpacing:'0.02em',transition:`background 180ms ${ease}`}}>Devis gratuit</button>
        </nav>
      </div>
    </header>
  );
}

/* ── Footer ── */

  const go = (id) => { setPage(id); window.scrollTo({top:0}); };
  return (
    <footer style={{background:C.dark,padding:'64px 40px 32px'}}>
      <div style={{maxWidth:1200,margin:'0 auto'}}>

          <div>
            <div style={{marginBottom:16,cursor:'pointer'}} onClick={()=>go('accueil')}><Logo dark size="md"/></div>

/* ── Eyebrow ── */
function Eyebrow({ children, light=false, center=false }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,justifyContent:center?'center':'flex-start',marginBottom:14}}>
      <span style={{display:'inline-block',width:24,height:1.5,background:C.gold,flexShrink:0}}></span>
      <span style={{fontFamily:F.sans,fontSize:10,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:C.gold}}>{children}</span>
    </div>
  );
}

            <p style={{fontFamily:F.sans,fontSize:15,color:C.muted,lineHeight:1.75,marginBottom:28}}>Agréé ANDE depuis décembre 2025, organisme de formation FDFP dans 4 domaines, le cabinet combine rigueur technique et compréhension du terrain ivoirien.</p>

                  </div>

              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {[
                  ['Rotary International','#E5ECF2',C.dark],

      {/* Vision */}
      <section style={{background:C.green,padding:'64px 40px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,backgroundImage:'repeating-linear-gradient(45deg,rgba(200,151,58,0.06) 0,rgba(200,151,58,0.06) 1px,transparent 1px,transparent 32px)'}}></div>

    </>

              <a href="catalogue.html" target="_blank" style={{fontFamily:F.sans,fontSize:13,fontWeight:600,padding:'10px 18px',borderRadius:4,background:C.gold,color:C.white,textDecoration:'none',flexShrink:0}}>Voir →</a>

      </section>

    services: <PageServices setPage={setPage}/>,
    academy:  <PageAcademy setPage={setPage}/>,
    cabinet:  <PageCabinet setPage={setPage}/>,
    contact:  <PageContact/>,
  };
  return (
    <div>
      <Header page={page} setPage={p=>{setPage(p);window.scrollTo({top:0});}}/>

      <Footer setPage={p=>{setPage(p);window.scrollTo({top:0});}}/>

  );
}
